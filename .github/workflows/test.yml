name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r backend_deploy/backend/requirements.txt
      - run: pytest tests/test_anonymize.py tests/test_scraper_utils.py tests/test_scoring.py -v